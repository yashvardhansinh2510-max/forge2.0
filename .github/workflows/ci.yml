name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: pip install -r requirements-prod.txt pyflakes pytest
      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements-prod.txt
      - name: Lint (pyflakes)
        run: |
          python -m pyflakes routes/*.py services/*.py catalog_pipeline/*.py migrations/*.py \
            auth.py models.py server.py seed.py settings.py bootstrap.py db.py \
            | grep -v "imported but unused" | grep -v "assigned to but never used" > pyflakes.out || true
          if [ -s pyflakes.out ]; then cat pyflakes.out; exit 1; fi
      - name: Static analysis (compile check)
        run: python -m compileall -q routes services catalog_pipeline migrations scripts *.py
      - name: Unit tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: forge_ci_unit_tests
          JWT_SECRET: ci-unit-test-secret-not-a-real-secret-32chars
          JWT_ALGORITHM: HS256
          JWT_EXP_MINUTES: "43200"
          MEDIA_STORAGE_DRIVER: supabase
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-not-real
          SUPABASE_ANON_KEY: ci-placeholder-not-real
          SUPABASE_PUBLIC_BUCKET: forge-products
          SUPABASE_PRIVATE_BUCKET: forge-private
          FORGE_ALLOW_DEMO_SEED: "false"
          ENVIRONMENT: production
        run: python -m pytest tests/unit -v
      # Integration tests (tests/integration/) intentionally NOT run here —
      # see tests/INTEGRATION_TESTING_STRATEGY.md: they need a live deployed
      # backend + real credentials, never the shared production Atlas cluster.
      - name: Docker build
        run: docker build -t buildcon-backend .
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Dependency vulnerability scan (npm audit)
        run: npm audit --audit-level=high
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Lint
        run: npx expo lint -- --max-warnings 200
