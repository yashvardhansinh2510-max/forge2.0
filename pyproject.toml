[tool.ruff]
line-length = 140
target-version = "py311"

[tool.ruff.lint]
# Ignore stylistic single-line-statement rules that flare on legacy catalog ETL scripts.
# These are cosmetic (semicolons, colons on one line, single-letter loop vars); not bugs.
ignore = ["E701", "E702", "E741", "E402", "E501", "F401", "F811"]
