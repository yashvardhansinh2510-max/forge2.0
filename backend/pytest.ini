[pytest]
# Default to the self-contained suite only — tests/integration/ needs a live
# deployed backend + real credentials and can't even be collected without
# that setup (see tests/INTEGRATION_TESTING_STRATEGY.md). Run those
# explicitly with `pytest tests/integration` when you actually have that
# environment available; a bare `pytest` here must never fail to collect.
testpaths = tests/unit
markers =
    integration: hits a live deployed backend + real credentials; not run in CI (see tests/INTEGRATION_TESTING_STRATEGY.md)
asyncio_mode = auto
